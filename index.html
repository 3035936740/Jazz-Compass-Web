<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script type="module" src="./script.js">
    </script>
    <title>Music Theory Toolbox</title>
    <style>
        @import url('./style.css');
    </style>
</head>

<body>
    <main class="container">
        <header class="app-header">
            <div class="logo" aria-hidden="true">MTT</div>
            <div class="title-block">
                <h1 id="header_h1">Jazz Compass</h1>
                <div id="subtitle" class="subtitle">Modern Jazz Tools · 即时乐理与即兴建议</div>
            </div>
        </header>

        <nav class="feature-nav" role="tablist">
            <button class="feature-btn active" data-feature="chord"><span id="nav_chord">和弦转换处理</span></button>
            <button class="feature-btn" data-feature="blues"><span id="nav_blues">布鲁斯工具处理</span></button>
            <button class="feature-btn" data-feature="lcc"><span id="nav_lcc">LCC理论处理</span></button>
            <button class="feature-btn" data-feature="cst"><span id="nav_cst">CST理论处理</span></button>
            <!--button class="feature-btn" data-feature="rec"><span id="nav_rec">和弦衔接</span></button-->
            <button class="feature-btn" data-feature="neo"><span id="nav_neo">新里曼理论</span></button>
            <button class="feature-btn" data-feature="ref"><span id="nav_ref">和弦音阶速查</span></button>
            <button class="feature-btn" data-feature="circle"><span id="nav_circle">五度圈</span></button>
            <button class="feature-btn" data-feature="other"><span id="nav_other">其他工具</span></button>
            <button class="feature-btn" data-feature="about"><span id="nav_about">关于</span></button>
        </nav>

        <section class="panels">
            <div id="panel-chord" class="panel" data-feature="chord" role="tabpanel">
                <div class="panel-header">
                    <label><span id="label_chord_example">示例和弦（单独）：</span> <input id="chord-input" type="text"
                            value="C, E, G, B" /></label>
                    <button id="chord-run"><span id="chord_run_btn">解析</span></button>
                </div>
                <div class="panel-body" id="panel-chord-body"></div>
            </div>

            <div id="panel-blues" class="panel" data-feature="blues" role="tabpanel">
                <div class="panel-header">
                    <label><span id="label_blues_example">示例和弦（布鲁斯）：</span> <input id="blues-input" type="text"
                            value="C#m7b5" /></label>
                    <button id="blues-run"><span id="blues_run_btn">分析</span></button>
                </div>
                <div class="panel-body" id="panel-blues-body"></div>
            </div>

            <div id="panel-lcc" class="panel" data-feature="lcc" role="tabpanel">
                <div class="panel-header">
                    <label><span id="label_lcc_example">示例和弦（LCC）：</span> <input id="lcc-input" type="text"
                            value="Cmaj7" /></label>
                    <button id="lcc-run"><span id="lcc_run_btn">分析</span></button>
                </div>
                <div class="panel-body" id="panel-lcc-body"></div>
            </div>

            <div id="panel-cst" class="panel" data-feature="cst" role="tabpanel">
                <div class="panel-header">
                    <label><span id="label_cst_example">示例和弦（CST）：</span> <input id="cst-input" type="text"
                            value="Dbm9/E" /></label>
                    <button id="cst-run"><span id="cst_run_btn">分析</span></button>
                </div>
                <div class="panel-body" id="panel-cst-body"></div>
            </div>

            <!--div id="panel-rec" class="panel" data-feature="rec" role="tabpanel">
                <div class="panel-header">
                    <label><span id="nav_rec_example">示例和弦（衔接推荐）：</span> <input id="rec-input" type="text"
                            value="C7" /></label>
                    <button id="rec-run"><span id="rec_run_btn">获取衔接推荐</span></button>
                </div>
                <div class="panel-body" id="panel-rec-body"></div>
            </div-->

            <div id="panel-other" class="panel" data-feature="other" role="tabpanel">
                <div class="panel-header">
                    <label><span id="label_other_example">示例和弦（其他）：</span> <input id="other-input" type="text"
                            value="Cmaj7" /></label>
                    <!-- axis input for negative harmony mode -->
                    <div id="negative-axis-row" style="display:none;">
                        <label><span id="label_other_axis">轴：</span> <input id="other-axis-input" type="text"
                                value="C" /></label>
                    </div>
                    <!-- dynamic chord inputs for key center mode -->
                    <div id="keycenter-inputs" style="display:none; margin-top:8px;">
                        <!-- entries will be injected by script -->
                        <button id="add-keycenter-chord" type="button">+</button>
                    </div>
                    <button id="other-run"><span id="other_run_btn">分析</span></button>
                </div>
                <!-- action buttons will be injected here -->
                <div id="other-action-row" class="panel-action-row"></div>
                <div class="panel-body" id="panel-other-body"></div>
            </div>

            <div id="panel-neo" class="panel" data-feature="neo" role="tabpanel">
                <div class="panel-header">
                    <label><span id="label_neo_example">示例和弦（新里曼）：</span> <input id="neo-input" type="text"
                            value="Cmaj" /></label>
                    <button id="neo-run"><span id="neo_run_btn">分析</span></button>
                </div>

                <!-- 深度控制行 -->
<!-- 深度控制行 -->
<div class="panel-header" style="border-top: 1px solid rgba(255,255,255,0.06); margin-top:0; padding-top:10px;">
    <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
        <span style="color:var(--muted); font-size:0.85rem;" id="neo_depth_label">展开层数：</span>
        <input id="neo-depth-input" type="number" value="1" min="1" max="10" 
               style="width:55px; padding:4px 8px; border-radius:4px; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.06); color:#fff; font-size:0.85rem; text-align:center;" />
        <button id="neo-depth-apply" style="padding:4px 12px; border-radius:4px; border:1px solid var(--accent-2); background:rgba(0,181,173,0.12); color:var(--accent-2); cursor:pointer; font-size:0.8rem;">应用</button>
        <span style="color:var(--muted); font-size:0.75rem; margin-left:2px;">间距：</span>
        <input id="neo-spacing-input" type="number" value="100" min="50" max="250" step="5"
               style="width:55px; padding:4px 6px; border-radius:4px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.04); color:#ccc; font-size:0.8rem; text-align:center;" />
        <span style="color:var(--muted); font-size:0.7rem;">px</span>
        <span style="color:var(--muted); font-size:0.75rem; margin-left:2px;">球大小：</span>
        <input id="neo-node-size-input" type="range" min="12" max="36" value="22" step="1"
               style="width:70px; accent-color:var(--accent-2);" />
        <span id="neo-node-size-val" style="color:var(--muted); font-size:0.75rem;">22</span>
    </div>
    <div style="display:flex; gap:8px; align-items:center; margin-top:6px;">
        <span style="display:flex; gap:4px; align-items:center;">
            <span style="display:inline-block; width:12px; height:12px; border-radius:3px; background:hsl(145,55%,45%);"></span>
            <span style="color:var(--muted); font-size:0.7rem;">PLRSN D1 (基本)</span>
        </span>
        <span style="display:flex; gap:4px; align-items:center; margin-left:8px;">
            <span style="display:inline-block; width:12px; height:12px; border-radius:3px; background:hsl(260,50%,55%);"></span>
            <span style="color:var(--muted); font-size:0.7rem;">扩展变换</span>
        </span>
        <span id="neo_pan_hint" style="color:var(--muted); font-size:0.75rem; margin-left:12px;">🖱 左键拖拽画布 | 右键拖拽节点 | 滚轮缩放 | 双击重置</span>
        <button id="neo-reset-view" style="padding:4px 10px; border-radius:4px; border:1px solid rgba(255,255,255,0.15); background:transparent; color:var(--muted); cursor:pointer; font-size:0.8rem;">↺ 重置视图</button>
        <button id="neo-reset-positions" style="padding:4px 10px; border-radius:4px; border:1px solid rgba(255,255,255,0.15); background:transparent; color:var(--muted); cursor:pointer; font-size:0.8rem;">⟲ 重置位置</button>
    </div>
</div>

                <!-- 和弦连接路径查找 -->
                <div class="panel-header" style="border-top: 1px solid rgba(255,255,255,0.06); margin-top: 0;">
                    <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
                        <label><span id="label_neo_path_from">从：</span> <input id="neo-path-from" type="text"
                                value="Cmaj" style="min-width:80px;" /></label>
                        <span style="color:var(--accent); font-size:1.2em;">→</span>
                        <label><span id="label_neo_path_to">到：</span> <input id="neo-path-to" type="text" value="Am"
                                style="min-width:80px;" /></label>
                        <label><span id="label_neo_max_steps">最大步数：</span> <input id="neo-max-steps" type="number"
                                value="8" min="1" max="20" style="min-width:50px; width:60px;" /></label>
                        <button id="neo-path-run"><span id="neo_path_run_btn">查找路径</span></button>
                    </div>
                </div>

                <div class="panel-body" id="panel-neo-body"></div>
            </div>

            <div id="panel-ref" class="panel" data-feature="ref" role="tabpanel">
                <div class="panel-header" style="flex-wrap:wrap; gap:12px;">
                    <div id="ref-scale-section" style="display:flex; align-items:center; gap:8px;">
                        <label><span id="label_ref_root">根音：</span>
                            <select id="ref-root-select"></select>
                        </label>
                        <label><span id="label_ref_scale">音阶：</span>
                            <select id="ref-scale-select"></select>
                        </label>
                        <button id="ref-scale-run"><span id="ref_scale_run_btn">查询音阶</span></button>
                    </div>
                    <div id="ref-family-section" style="display:flex; align-items:center; gap:8px;">
                        <label><span id="label_ref_family">和弦家族：</span>
                            <select id="ref-family-select"></select>
                        </label>
                        <button id="ref-family-run"><span id="ref_family_run_btn">查询家族</span></button>
                    </div>
                </div>
                <div class="panel-body" id="panel-ref-body"></div>
            </div>

            <div id="panel-circle" class="panel" data-feature="circle" role="tabpanel">
                <div class="panel-header" style="flex-direction:column; align-items:stretch;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span id="circle_instruction"
                            style="font-size:0.85rem; color:var(--muted);">点击外环或内环扇区查看调性详情</span>
                        <button id="circle-reset"
                            style="padding:4px 12px; border-radius:4px; border:1px solid rgba(255,255,255,0.2); background:transparent; color:var(--muted); cursor:pointer;">↺
                            Reset</button>
                    </div>
                </div>
                <div class="panel-body" id="panel-circle-body"
                    style="display:flex; flex-direction:column; align-items:center;">
                    <!-- Canvas 五度圈 -->
                    <div id="circle-canvas-container"
                        style="width:100%; max-width:520px; aspect-ratio:1/1; position:relative;">
                        <canvas id="circle-canvas" style="width:100%; height:100%; display:block;"></canvas>
                    </div>
                    <!-- 调性对照表 -->
                    <div id="circle-table-container" style="width:100%; margin-top:16px;"></div>
                </div>
            </div>

            <div id="panel-about" class="panel" data-feature="about" role="tabpanel">
                <div class="panel-body" id="panel-about-body"></div>
            </div>
        </section>
    </main>
</body>

</html>
